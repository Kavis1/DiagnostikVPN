name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources (icon)
        run: go-winres make

      - name: Build exe
        run: go build -ldflags="-s -w" -o diagnostikvpn.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: diagnostikvpn.exe
          generate_release_notes: true
